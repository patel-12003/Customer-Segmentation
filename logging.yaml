# ===========================================================================
# logging.yaml — Centralised logging configuration
# ===========================================================================
# Loaded by ``src/logger.py``. The file handler path is patched at runtime
# to point inside ``logs/`` so it always writes to the correct location.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "[%(asctime)s] [%(levelname)-7s] [%(name)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "[%(asctime)s] [%(levelname)-7s] [%(name)s] [%(filename)s:%(lineno)d] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    format: '{"time":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s","file":"%(filename)s","line":%(lineno)d,"message":"%(message)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/customer_segmentation.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 5242880
    backupCount: 3
    encoding: utf-8

loggers:
  customer_segmentation:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  src:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.upload:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.ai:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.reporting:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  matplotlib:
    level: WARNING
  PIL:
    level: WARNING
  autogluon:
    level: WARNING
  google.generativeai:
    level: INFO

root:
  level: WARNING
  handlers: [console]
