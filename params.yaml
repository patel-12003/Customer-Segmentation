# ===========================================================================
# params.yaml — Numerical / operational parameters
# ===========================================================================
# Separates parameter values from structural config so that they can be
# tuned without touching config.yaml.

# ---------------------------------------------------------------------------
# Clustering parameters
# ---------------------------------------------------------------------------
clustering:
  n_clusters: 3
  random_state: 42
  kmeans:
    init: "k-means++"
    n_init: 10
    max_iter: 300
  minibatch_kmeans:
    batch_size: 256
    n_init: 10
  gmm:
    covariance_type: "full"
    n_init: 5
  agglomerative:
    linkage: "ward"
  birch:
    threshold: 0.5
  dbscan:
    eps: 0.8
    min_samples: 10
  hdbscan:
    min_cluster_size: 30
    min_samples: 5
  optics:
    min_samples: 10
    xi: 0.05
  meanshift:
    bandwidth: null
    cluster_all: false
  spectral:
    affinity: "rbf"
    n_neighbors: 10

# ---------------------------------------------------------------------------
# Supervised parameters
# ---------------------------------------------------------------------------
supervised:
  test_size: 0.2
  random_state: 42
  tuning_trials: 30
  cv_folds: 5
  scoring: "accuracy"
  n_jobs: -1
  random_forest:
    n_estimators: 200
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    class_weight: "balanced"
  extra_trees:
    n_estimators: 250
    max_depth: null
  xgboost:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.9
    colsample_bytree: 0.9
    use_label_encoder: false
    eval_metric: "mlogloss"
  lightgbm:
    n_estimators: 200
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.9
    colsample_bytree: 0.9
  catboost:
    iterations: 300
    learning_rate: 0.05
    depth: 6
    verbose: false
  hist_gradient_boosting:
    max_iter: 250
    learning_rate: 0.05
    max_leaf_nodes: 31
  gradient_boosting:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 3
  adaboost:
    n_estimators: 150
    learning_rate: 0.5
  bagging:
    n_estimators: 200
    max_samples: 0.8
    max_features: 0.8
  voting:
    voting: "soft"
  stacking:
    passthrough: false

# ---------------------------------------------------------------------------
# AutoGluon
# ---------------------------------------------------------------------------
autogluon:
  time_limit: 300
  presets: "medium_quality"
  eval_metric: "accuracy"

# ---------------------------------------------------------------------------
# Optuna
# ---------------------------------------------------------------------------
optuna:
  n_trials: 25
  n_jobs: 1
  timeout: 600

# ---------------------------------------------------------------------------
# PCA / scaling
# ---------------------------------------------------------------------------
preprocessing:
  scale_method: "standard"
  pca_components: null
  pca_random_state: 42

# ---------------------------------------------------------------------------
# SHAP / LIME
# ---------------------------------------------------------------------------
explainability:
  shap_sample_size: 200
  lime_num_features: 10
